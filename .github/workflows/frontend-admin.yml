name: Frontend Admin CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend_admin/**'
      - '.github/workflows/frontend-admin.yml'
  pull_request:
    paths:
      - 'apps/frontend_admin/**'
      - '.github/workflows/frontend-admin.yml'

defaults:
  run:
    working-directory: apps/frontend_admin

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend_admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.example.com' }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'RBAC Admin Panel' }}
          VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION || '1.0.0' }}

      - name: Docker build (smoke test)
        run: |
          docker build --target prod \
            --build-arg VITE_API_URL=https://api.example.com \
            --build-arg VITE_APP_NAME="RBAC Admin Panel" \
            --build-arg VITE_APP_VERSION=1.0.0 \
            -t admin-panel:ci .
