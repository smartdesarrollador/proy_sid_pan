# ============================================
# Docker Compose - Development Services
# ============================================

services:
  app:
    build:
      context: .
      target: development
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  # Local LLM server (optional)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

  # Vector database (optional)
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    profiles:
      - vector-db

  # Cache / Message queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - cache

volumes:
  ollama_data:
  chroma_data:
  redis_data:
