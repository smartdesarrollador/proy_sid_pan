# ============================================
# Model Configuration
# ============================================

models:
  default:
    provider: anthropic
    model: claude-sonnet-4-5-20250929
    temperature: 0.7
    max_tokens: 4096

  fast:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.3
    max_tokens: 2048

  reasoning:
    provider: anthropic
    model: claude-opus-4-5-20251101
    temperature: 0.5
    max_tokens: 8192

  local:
    provider: ollama
    model: llama3.2
    base_url: http://localhost:11434
    temperature: 0.7
    max_tokens: 4096

# Embedding models
embeddings:
  default:
    provider: openai
    model: text-embedding-3-small
    dimensions: 1536

# Rate limiting
rate_limits:
  requests_per_minute: 60
  tokens_per_minute: 100000

# Retry configuration
retry:
  max_retries: 3
  backoff_factor: 2
  retry_on_status: [429, 500, 502, 503]
