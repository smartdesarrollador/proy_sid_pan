# ============================================
# Prompt Templates
# Reusable prompt patterns for common tasks
# ============================================

system_prompts:
  default: |
    You are a helpful AI assistant. Respond clearly and concisely.

  analyst: |
    You are a data analyst. Analyze the provided data and return
    structured insights with supporting evidence.

  coder: |
    You are an expert software engineer. Write clean, efficient,
    well-documented code. Follow best practices.

templates:
  summarize: |
    Summarize the following text in {max_sentences} sentences:

    {text}

  extract: |
    Extract the following information from the text:
    Fields: {fields}

    Text:
    {text}

    Return as JSON.

  classify: |
    Classify the following text into one of these categories: {categories}

    Text: {text}

    Return only the category name.

  chain_of_thought: |
    Think step by step to answer the following question:

    {question}

    Let's work through this step by step:
